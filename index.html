<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JHS Analytics Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #F7F6F3; --white: #FFFFFF; --text: #1A1A1A; --muted: #6B6B6B; --border: #E5E3DE; --accent: #1E6FFF; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .page-header { padding: 48px 48px 0; max-width: 1200px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .header-left .eyebrow { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .header-left h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--text); line-height: 1.2; }
  .project-count { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-size: 0.82rem; color: var(--muted); font-weight: 500; }
  .project-count span { color: var(--accent); font-weight: 700; }

  .filters-bar { max-width: 1200px; margin: 28px auto 0; padding: 0 48px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-right: 4px; }
  .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); color: var(--muted); font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .filter-btn:hover { border-color: #bbb; color: var(--text); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  .grid-wrapper { max-width: 1200px; margin: 32px auto 64px; padding: 0 48px; }
  .projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }

  .card { background: var(--white); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.22s, box-shadow 0.22s; cursor: pointer; animation: fadeIn 0.4s ease both; }
  .card:hover { transform: translateY(-5px); box-shadow: 0 16px 48px rgba(0,0,0,0.09); }
  @keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

  .card-img { position: relative; height: 200px; overflow: hidden; background: #e8e6e1; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.35s ease; }
  .card:hover .card-img img { transform: scale(1.04); }
  .img-placeholder { font-size: 3rem; opacity: 0.35; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .card-img img.errored { display: none; }
  .ind-pill { position: absolute; top: 14px; left: 14px; z-index: 2; padding: 4px 12px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; color: #fff; }

  .card-body { padding: 20px 20px 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-title { font-size: 1rem; font-weight: 600; line-height: 1.35; color: var(--text); }
  .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.65; flex: 1; }
  .card-tools { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .tool-tag { padding: 3px 10px; border-radius: 10px; font-size: 0.68rem; font-weight: 600; background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

  .card-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .view-btn { font-size: 0.78rem; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; }
  .view-btn .arrow { transition: transform 0.2s; }
  .card:hover .view-btn .arrow { transform: translateX(4px); }

  .state-box { grid-column: span 3; text-align: center; padding: 80px 24px; color: var(--muted); }
  .state-box .icon { font-size: 3rem; margin-bottom: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* REFRESH BUTTON */
  .refresh-btn { display: flex; align-items: center; gap: 6px; background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-size: 0.8rem; font-weight: 500; color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning .icon-refresh { animation: spin 0.7s linear infinite; display: inline-block; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(15,15,15,0.55); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 22px; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; box-shadow: 0 32px 80px rgba(0,0,0,0.22); animation: modalIn 0.25s ease; }
  @keyframes modalIn { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  .modal-img { width: 100%; height: 240px; object-fit: cover; display: block; }
  .modal-img-placeholder { height: 240px; display: flex; align-items: center; justify-content: center; font-size: 4rem; }
  .modal-content { padding: 28px; }
  .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; line-height: 1.25; flex: 1; }
  .modal-close { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-size: 1rem; color: var(--muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: inherit; }
  .modal-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.75; margin-bottom: 22px; }
  .modal-section { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; }
  .features-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .features-list li { display: flex; gap: 10px; font-size: 0.86rem; align-items: flex-start; }
  .modal-tools { display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-tool { padding: 5px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }

  @media (max-width: 960px) { .projects-grid { grid-template-columns: 1fr 1fr; } .state-box { grid-column: span 2; } }
  @media (max-width: 600px) { .page-header, .filters-bar, .grid-wrapper { padding-left: 20px; padding-right: 20px; } .projects-grid { grid-template-columns: 1fr; } .state-box { grid-column: span 1; } .page-header h1 { font-size: 1.7rem; } }
</style>
</head>
<body>

<div class="page-header">
  <div class="header-left">
    <div class="eyebrow">⚡ Power BI Analytics</div>
    <h1>Featured Projects</h1>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="refresh-btn" id="refreshBtn" onclick="loadSheet(true)">
      <span class="icon-refresh">↻</span> Refresh from Sheet
    </button>
    <div class="project-count">Showing <span id="countShowing">0</span> of <span id="countTotal">0</span> projects</div>
  </div>
</div>

<div class="filters-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" onclick="applyFilter('All', this)">All</button>
</div>

<div class="grid-wrapper">
  <div class="projects-grid" id="grid">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Loading projects from Google Sheets…</p>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div id="modal-img-wrap"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-section">Key Features</div>
      <ul class="features-list" id="modal-features"></ul>
      <div class="modal-section">Tools & Technologies</div>
      <div class="modal-tools" id="modal-tools"></div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1_wlIl8Du5cKqrDZHAB3-hgLvq0ckr8efknO_bg7XA4I';
const SHEET_GID = '0';

const IND_COLORS = {
  'Finance':        { bg: '#1A5C3A', light: '#E8F5EE', text: '#1A5C3A', icon: '💰' },
  'HR':             { bg: '#7C3AED', light: '#F3EEFF', text: '#7C3AED', icon: '👥' },
  'Supply Chain':   { bg: '#B45309', light: '#FEF3E2', text: '#B45309', icon: '🚛' },
  'Share Market':   { bg: '#1D4ED8', light: '#EFF4FF', text: '#1D4ED8', icon: '📈' },
  'Sales':          { bg: '#BE185D', light: '#FDF0F6', text: '#BE185D', icon: '🛒' },
  'Operations':     { bg: '#0F766E', light: '#EDFAF8', text: '#0F766E', icon: '⚙️' },
  'Procurement':    { bg: '#92400E', light: '#FEF3E2', text: '#92400E', icon: '📦' },
  'Reconciliation': { bg: '#374151', light: '#F3F4F6', text: '#374151', icon: '🔁' },
};
function getColor(industry) {
  for (const [key, val] of Object.entries(IND_COLORS)) {
    if (industry && industry.toLowerCase().includes(key.toLowerCase())) return val;
  }
  return { bg: '#1E6FFF', light: '#EEF3FF', text: '#1E6FFF', icon: '📊' };
}

let allProjects = [];
let activeFilter = 'All';

// ── LOAD FROM GOOGLE SHEETS ──────────────────────────────────────────────────
async function loadSheet(manual = false) {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  if (!manual) {
    document.getElementById('grid').innerHTML = `<div class="state-box"><div class="spinner"></div><p>Loading projects from Google Sheets…</p></div>`;
  }

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}&t=${Date.now()}`;
  try {
    const res  = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/)[1]);
    allProjects = parseGviz(json);
    if (!allProjects.length) throw new Error('Sheet appears empty or headers not found.');
    buildFilters();
    renderGrid(activeFilter === 'All' ? allProjects : allProjects.filter(p => p.industry === activeFilter));
    if (manual) showToast('✅ Projects updated from Google Sheets!');
  } catch (e) {
    document.getElementById('grid').innerHTML = `
      <div class="state-box">
        <div class="icon">⚠️</div>
        <p><strong>Could not load sheet.</strong><br>Check that sharing is set to <em>Anyone with the link → Viewer</em>.<br>
        <small style="opacity:0.6">${e.message}</small></p>
      </div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

function parseGviz(json) {
  const cols = json.table.cols.map(c => c.label.toLowerCase().replace(/[\s_]+/g,''));
  const rows  = json.table.rows || [];
  const idx   = key => cols.findIndex(c => c === key || c.includes(key));
  return rows.map(row => {
    const get = key => {
      const i = idx(key);
      return (i >= 0 && row.c[i] && row.c[i].v != null) ? String(row.c[i].v).trim() : '';
    };
    return {
      title:       get('title'),
      industry:    get('industry'),
      description: get('description'),
      features:    get('features').split('|').map(f => f.trim()).filter(Boolean),
      tools:       get('tools').split(',').map(t => t.trim()).filter(Boolean),
      imageUrl:    get('imageurl') || get('image') || '',
    };
  }).filter(p => p.title);
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function buildFilters() {
  const bar = document.querySelector('.filters-bar');
  bar.querySelectorAll('.filter-btn:not(:first-child)').forEach(b => b.remove());
  [...new Set(allProjects.map(p => p.industry).filter(Boolean))].forEach(ind => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = ind;
    btn.onclick = () => applyFilter(ind, btn);
    bar.appendChild(btn);
  });
}
function applyFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(val === 'All' ? allProjects : allProjects.filter(p => p.industry === val));
}

// ── RENDER GRID ───────────────────────────────────────────────────────────────
function renderGrid(projects) {
  document.getElementById('countTotal').textContent   = allProjects.length;
  document.getElementById('countShowing').textContent = projects.length;
  const grid = document.getElementById('grid');
  if (!projects.length) { grid.innerHTML = `<div class="state-box"><div class="icon">🔍</div><p>No projects found.</p></div>`; return; }

  grid.innerHTML = projects.map((p, i) => {
    const realIdx = allProjects.indexOf(p);
    const c = getColor(p.industry);
    const hasImg = p.imageUrl && !p.imageUrl.includes('placeholder') && p.imageUrl.trim() !== '';
    const imgHtml = hasImg
      ? `<img src="${p.imageUrl}" alt="${p.title}" onerror="this.classList.add('errored');this.nextElementSibling.style.display='flex'">
         <div class="img-placeholder" style="display:none">${c.icon}</div>`
      : `<div class="img-placeholder">${c.icon}</div>`;
    const toolTags = p.tools.slice(0,3).map(t => `<span class="tool-tag">${t}</span>`).join('');
    const extra = p.tools.length > 3 ? `<span class="tool-tag">+${p.tools.length-3}</span>` : '';
    return `
    <div class="card" style="animation-delay:${i*0.06}s" onclick="openModal(${realIdx})">
      <div class="card-img">
        ${imgHtml}
        <span class="ind-pill" style="background:${c.bg}">${p.industry}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.description}</div>
        <div class="card-tools">${toolTags}${extra}</div>
      </div>
      <div class="card-footer">
        <button class="view-btn" onclick="event.stopPropagation();openModal(${realIdx})">View Details <span class="arrow">→</span></button>
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(idx) {
  const p = allProjects[idx];
  const c = getColor(p.industry);
  const hasImg = p.imageUrl && !p.imageUrl.includes('placeholder') && p.imageUrl.trim() !== '';
  document.getElementById('modal-img-wrap').innerHTML = hasImg
    ? `<img class="modal-img" src="${p.imageUrl}" alt="${p.title}" onerror="this.style.display='none'">`
    : `<div class="modal-img-placeholder" style="background:${c.light}">${c.icon}</div>`;
  document.getElementById('modal-title').textContent = p.title;
  document.getElementById('modal-desc').textContent  = p.description;
  document.getElementById('modal-features').innerHTML = p.features.map(f =>
    `<li><span style="color:${c.text};font-weight:700;margin-right:6px">✓</span>${f}</li>`).join('');
  document.getElementById('modal-tools').innerHTML = p.tools.map(t =>
    `<span class="modal-tool" style="background:${c.light};color:${c.text}">${t}</span>`).join('');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && e.type === 'click' && e.target.id !== 'overlay') return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:12px 24px;border-radius:50px;font-size:0.85rem;font-weight:500;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.2);animation:fadeIn 0.3s ease';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadSheet();
</script>
</body>
</html>
